<!-- GALLERY.html-->
{% extends 'base.html' %}
{% load static %}

{% block childpage %}
<style>
    .infra:hover
    {
    filter:grayscale(100%);
    transition:1s;
    transform:scale(1.02);
    }
</style>
<!-- start heading-->
<div class="row">
    <div class="col-sm-5 mx-auto text-center my-4">
        <p class="fs-3 m-0">Our <b class="txt-color1">Gallery
        <i class="fa-solid fa-image"></i>
        </b></p>
        <i>Our gallery showcases vibrant moments of learning, achievements, and events from college life.</i>
        <hr/>
    </div>
</div>
<!-- end heading-->

<div class="row">
    <div class="col-sm-10 mx-auto">
        <div class="row">

            <!-- start infra -->
            {% for i in gdata %}
            <div class="col-sm-4">
                <div class="card infra text-center shadow-lg mb-2 bg-body-tertiary rounded border-0 p-3">
                    <img src="../{{i.gallery_picture}}" style="max-height:280px;" class="img-thumbnail"/>
                </div>
            </div>
            {% endfor %}
            <!-- start infra -->
        </div>
    </div>
</div>
{% endblock %}
<!-- end GALLERY.html-->
